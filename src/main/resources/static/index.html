<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodTunes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: white;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #1db954, #1ed760, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: #aaa;
      margin-top: 8px;
      font-size: 1rem;
    }

    .moods {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      padding: 30px 20px;
    }

    .mood-btn {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }

    .mood-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .mood-btn.happy    { background: linear-gradient(135deg, #f9d423, #ff4e50); color: #000; }
    .mood-btn.sad      { background: linear-gradient(135deg, #2193b0, #6dd5ed); color: #000; }
    .mood-btn.energetic{ background: linear-gradient(135deg, #f7971e, #ffd200); color: #000; }
    .mood-btn.calm     { background: linear-gradient(135deg, #56ab2f, #a8e063); color: #000; }
    .mood-btn.angry    { background: linear-gradient(135deg, #cb2d3e, #ef473a); color: #fff; }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 16px;
    }

    #status {
      text-align: center;
      color: #aaa;
      margin: 10px;
      font-size: 0.95rem;
    }

    .songs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .song-card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .song-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 30px rgba(29,185,84,0.3);
    }

    .song-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .song-card h3 {
      font-size: 0.9rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-card p {
      font-size: 0.75rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    audio {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎵 MoodTunes</h1>
    <p>Pick a mood and discover your perfect playlist</p>
  </header>

  <div class="moods">
    <button class="mood-btn happy"     onclick="fetchSongs('happy')">Happy</button>
    <button class="mood-btn sad"       onclick="fetchSongs('sad')">Sad</button>
    <button class="mood-btn energetic" onclick="fetchSongs('energetic')">Energetic</button>
    <button class="mood-btn calm"      onclick="fetchSongs('calm')">Calm</button>
    <button class="mood-btn angry"     onclick="fetchSongs('angry')">Angry</button>
  </div>

  <canvas id="visualizer" width="800" height="120"></canvas>
  <p id="status">Choose a mood to get started</p>

  <div class="songs-grid" id="songs-grid"></div>

  <script>
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    let animationId;
    let moodColor = '#1db954';

    const moodColors = {
      happy: '#f9d423',
      sad: '#2193b0',
      energetic: '#f7971e',
      calm: '#56ab2f',
      angry: '#cb2d3e'
    };

    function animateVisualizer(color) {
      moodColor = color;
      cancelAnimationFrame(animationId);
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const bars = 60;
      const barWidth = canvas.width / bars;
      const time = Date.now() / 300;

      for (let i = 0; i < bars; i++) {
        const height = 30 + Math.sin(i * 0.4 + time) * 25 + Math.sin(i * 0.8 + time * 1.5) * 15;
        const x = i * barWidth;
        const y = (canvas.height - height) / 2;

        ctx.fillStyle = moodColor;
        ctx.globalAlpha = 0.7 + Math.sin(i + time) * 0.3;
        ctx.beginPath();
        ctx.roundRect(x + 2, y, barWidth - 4, height, 4);
        ctx.fill();
      }

      animationId = requestAnimationFrame(draw);
    }

    async function fetchSongs(mood) {
      document.getElementById('status').textContent = `Loading ${mood} songs...`;
      document.getElementById('songs-grid').innerHTML = '';
      animateVisualizer(moodColors[mood]);

      try {
        const response = await fetch(`/api/songs?mood=${mood}`);
        const data = await response.json();
        const tracks = data.tracks.items;

        document.getElementById('status').textContent = `Showing ${tracks.length} songs for "${mood}" mood`;

        tracks.forEach(track => {
          const card = document.createElement('div');
          card.className = 'song-card';

          const img = track.album.images[0]?.url || '';
          const preview = track.preview_url || '';
          const name = track.name;
          const artist = track.artists.map(a => a.name).join(', ');

          card.innerHTML = `
            <img src="${img}" alt="${name}" />
            <h3>${name}</h3>
            <p>${artist}</p>
            ${preview ? `<audio controls src="${preview}"></audio>` : '<p style="color:#666;font-size:0.7rem">No preview available</p>'}
          `;

          document.getElementById('songs-grid').appendChild(card);
        });

      } catch (err) {
        document.getElementById('status').textContent = 'Something went wrong. Try again!';
      }
    }
  </script>

</body>
</html>
